<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPOUSEHUB - Login</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
    <a href="index.html" class="auth-nav-link">&larr;</a>
    
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Login to find your perfect match.</p>
        <form id="login-form">
            <div class="input-group">
                <input type="email" id="login-email" name="email" required placeholder=" " />
                <label for="login-email">Email Address</label>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" name="password" required placeholder=" " />
                <label for="login-password">Password</label>
            </div>
            <button type="submit" class="auth-submit-btn">Login</button>
        </form>
        <p class="auth-toggle-text">Don't have an account? <a href="signup.html" class="auth-toggle-link" style="text-decoration:none;">Sign up</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
